<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โครงงาน AI Smart Bin - ณัฐชริกา ทรัพย์พิพิษ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #10b981; /* Green theme for smart bin */
            --primary-glow: rgba(16, 185, 129, 0.5);
            --secondary: #3b82f6; /* Blue highlights */
            --glass: rgba(17, 24, 39, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Noise Overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Ambient Glow Backgrounds */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.3;
        }

        .glow-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--primary) 0%, transparent 60%);
        }

        .glow-2 {
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 60%);
        }

        /* Header Navigation */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-back:hover {
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateX(-3px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
        }

        .logo span {
            color: #34d399;
        }

        /* Title Area */
        .page-title-section {
            width: 90%;
            max-width: 1200px;
            text-align: center;
            margin: 1.5rem 0;
            z-index: 10;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(45deg, #10b981, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        /* Portfolio 3-column grid */
        .portfolio-list {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            padding: 1rem 0 5rem;
            z-index: 10;
        }

        @media (max-width: 900px) {
            .portfolio-list {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            .portfolio-list {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        .portfolio-item {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 30px 60px rgba(16, 185, 129, 0.15);
        }

        .portfolio-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .page-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(3, 7, 18, 0.7);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>
    <!-- Ambient Glows -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- Navigation Header -->
    <header>
        <a href="portfolio.html" class="btn-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            ย้อนกลับ
        </a>
        <a href="portfolio.html" class="logo">Smart<span>Bin.</span></a>
    </header>

    <div class="page-title-section">
        <h1 class="page-title">โครงงาน AI Smart Bin 🗑️</h1>
        <p class="page-subtitle">ระบบถังขยะอัจฉริยะคัดแยกประเภทด้วยกล้องและปัญญาประดิษฐ์</p>
    </div>

    <!-- Vertical Document Stack -->
    <div class="portfolio-list">
        <div class="portfolio-item">
            <img src="assets/smart_bin_page1.png" alt="Smart Bin Page 1 - หน้าปกรายงาน">
            <div class="page-badge">หน้า 1 / 4</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/smart_bin_page2.png" alt="Smart Bin Page 2 - โครงสร้างและฮาร์ดแวร์" loading="lazy">
            <div class="page-badge">หน้า 2 / 4</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/smart_bin_page3.png" alt="Smart Bin Page 3 - การประมวลผลด้วย AI YOLOv8" loading="lazy">
            <div class="page-badge">หน้า 3 / 4</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/smart_bin_page4.png" alt="Smart Bin Page 4 - แดชบอร์ดสรุปสถิติ" loading="lazy">
            <div class="page-badge">หน้า 4 / 4</div>
        </div>
    </div>
</body>

</html>
