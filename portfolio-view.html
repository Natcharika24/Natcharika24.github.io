<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แฟ้มสะสมผลงาน (Portfolio) - ณัฐชริกา ทรัพย์พิพิษ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #d946ef;
            --glass: rgba(17, 24, 39, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Noise Overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Ambient Glow Backgrounds */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.3;
        }

        .glow-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--primary) 0%, transparent 60%);
        }

        .glow-2 {
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 60%);
        }

        /* Header Navigation */
        header {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-back:hover {
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateX(-3px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
        }

        .logo span {
            color: #a78bfa;
        }

        /* Main Content Slider */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 1rem 5%;
            z-index: 10;
        }

        .viewer-container {
            width: 100%;
            max-width: 850px;
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .slides-wrapper {
            position: relative;
            width: 100%;
        }

        .slide {
            display: none;
            width: 100%;
            text-align: center;
        }

        .slide.active {
            display: block;
        }

        .slide img {
            width: 100%;
            height: auto;
            max-height: 75vh;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        /* Navigation Buttons */
        .prev-slide, .next-slide {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 24px 18px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            transition: 0.3s;
            user-select: none;
            background-color: rgba(3, 7, 18, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            text-decoration: none;
            z-index: 100;
        }

        .prev-slide {
            left: 0;
            border-radius: 0 12px 12px 0;
            border-left: none;
        }

        .next-slide {
            right: 0;
            border-radius: 12px 0 0 12px;
            border-right: none;
        }

        .prev-slide:hover, .next-slide:hover {
            background-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* Indicators and Pagination */
        .controls-panel {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
        }

        .page-info {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .indicators {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            cursor: pointer;
            height: 12px;
            width: 12px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dot.active, .dot:hover {
            background-color: var(--primary);
            transform: scale(1.3);
            box-shadow: 0 0 12px var(--primary-glow);
            border-color: var(--primary);
        }

        /* Keyboard Help */
        .keyboard-tip {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .prev-slide, .next-slide {
                padding: 16px 12px;
                font-size: 18px;
            }
            .viewer-container {
                border-radius: 12px;
            }
        }
    </style>
</head>

<body>
    <!-- Ambient Glows -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- Navigation Header -->
    <header>
        <a href="portfolio.html" class="btn-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            ย้อนกลับ
        </a>
        <a href="portfolio.html" class="logo">Port<span>folio.</span></a>
    </header>

    <!-- Main Viewport -->
    <main>
        <div class="viewer-container">
            <div class="slides-wrapper">
                <!-- Slides 1 - 13 -->
                <div class="slide active">
                    <img src="assets/portfolio_page1.png" alt="Portfolio Cover Page">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page2.png" alt="Portfolio Profile Details">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page3.png" alt="Portfolio Project Details">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page4.png" alt="Portfolio Activities 1">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page5.png" alt="Portfolio Activities 2">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page6.png" alt="Portfolio Activities 3">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page7.png" alt="Portfolio Activities 4">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page8.png" alt="Portfolio Volunteer Activities 1">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page9.png" alt="Portfolio Volunteer Activities 2">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page10.png" alt="Portfolio Certificates 1">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page11.png" alt="Portfolio Certificates 2">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page12.png" alt="Portfolio Certificates 3">
                </div>
                <div class="slide">
                    <img src="assets/portfolio_page13.png" alt="Portfolio Thank You">
                </div>

                <!-- Next/Prev Buttons -->
                <a class="prev-slide" onclick="changeSlide(-1)">&#10094;</a>
                <a class="next-slide" onclick="changeSlide(1)">&#10095;</a>
            </div>
        </div>

        <!-- Controls panel -->
        <div class="controls-panel">
            <div class="page-info" id="pageInfo">หน้า 1 / 13</div>
            <div class="indicators" id="indicators">
                <span class="dot active" onclick="gotoSlide(1)"></span>
                <span class="dot" onclick="gotoSlide(2)"></span>
                <span class="dot" onclick="gotoSlide(3)"></span>
                <span class="dot" onclick="gotoSlide(4)"></span>
                <span class="dot" onclick="gotoSlide(5)"></span>
                <span class="dot" onclick="gotoSlide(6)"></span>
                <span class="dot" onclick="gotoSlide(7)"></span>
                <span class="dot" onclick="gotoSlide(8)"></span>
                <span class="dot" onclick="gotoSlide(9)"></span>
                <span class="dot" onclick="gotoSlide(10)"></span>
                <span class="dot" onclick="gotoSlide(11)"></span>
                <span class="dot" onclick="gotoSlide(12)"></span>
                <span class="dot" onclick="gotoSlide(13)"></span>
            </div>
            <div class="keyboard-tip">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line></svg>
                ใช้ปุ่มลูกศร ◄ / ► บนคีย์บอร์ดเพื่อเปลี่ยนหน้าได้
            </div>
        </div>
    </main>

    <script>
        let currentSlideIndex = 1;
        const slides = document.getElementsByClassName("slide");
        const dots = document.getElementsByClassName("dot");
        const pageInfo = document.getElementById("pageInfo");

        function updateSlider() {
            // Hide all slides
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");
            }
            // Remove active dot
            for (let i = 0; i < dots.length; i++) {
                dots[i].classList.remove("active");
            }

            // Boundary checks
            if (currentSlideIndex > slides.length) {
                currentSlideIndex = 1;
            }
            if (currentSlideIndex < 1) {
                currentSlideIndex = slides.length;
            }

            // Show active slide and dot
            slides[currentSlideIndex - 1].classList.add("active");
            dots[currentSlideIndex - 1].classList.add("active");

            // Update page info text
            pageInfo.innerText = `หน้า ${currentSlideIndex} / ${slides.length}`;
        }

        function changeSlide(n) {
            currentSlideIndex += n;
            updateSlider();
        }

        function gotoSlide(n) {
            currentSlideIndex = n;
            updateSlider();
        }

        // Keyboard navigation
        document.addEventListener("keydown", function (e) {
            if (e.key === "ArrowLeft") {
                changeSlide(-1);
            } else if (e.key === "ArrowRight") {
                changeSlide(1);
            }
        });
    </script>
</body>

</html>
