<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แฟ้มสะสมผลงาน (Portfolio) - ณัฐชริกา ทรัพย์พิพิษ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #d946ef;
            --glass: rgba(17, 24, 39, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Noise Overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Ambient Glow Backgrounds */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.3;
        }

        .glow-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--primary) 0%, transparent 60%);
        }

        .glow-2 {
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 60%);
        }

        /* Header Navigation */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-back:hover {
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateX(-3px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
        }

        .logo span {
            color: #a78bfa;
        }

        /* Portfolio vertical list */
        .portfolio-list {
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            padding: 1rem 0 5rem;
            z-index: 10;
        }

        .portfolio-item {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 30px 60px rgba(139, 92, 246, 0.15);
        }

        .portfolio-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .page-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(3, 7, 18, 0.7);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>
    <!-- Ambient Glows -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- Navigation Header -->
    <header>
        <a href="portfolio.html" class="btn-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            ย้อนกลับ
        </a>
        <a href="portfolio.html" class="logo">Port<span>folio.</span></a>
    </header>

    <!-- Vertical Document Stack -->
    <div class="portfolio-list">
        <div class="portfolio-item">
            <img src="assets/portfolio_page1.png" alt="Portfolio Page 1 - Cover Page">
            <div class="page-badge">หน้า 1 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page2.png" alt="Portfolio Page 2 - Profile Details" loading="lazy">
            <div class="page-badge">หน้า 2 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page3.png" alt="Portfolio Page 3 - Project Details" loading="lazy">
            <div class="page-badge">หน้า 3 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page4.png" alt="Portfolio Page 4 - Activities 1" loading="lazy">
            <div class="page-badge">หน้า 4 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page5.png" alt="Portfolio Page 5 - Activities 2" loading="lazy">
            <div class="page-badge">หน้า 5 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page6.png" alt="Portfolio Page 6 - Activities 3" loading="lazy">
            <div class="page-badge">หน้า 6 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page7.png" alt="Portfolio Page 7 - Activities 4" loading="lazy">
            <div class="page-badge">หน้า 7 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page8.png" alt="Portfolio Page 8 - Volunteer Activities 1" loading="lazy">
            <div class="page-badge">หน้า 8 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page9.png" alt="Portfolio Page 9 - Volunteer Activities 2" loading="lazy">
            <div class="page-badge">หน้า 9 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page10.png" alt="Portfolio Page 10 - Certificates 1" loading="lazy">
            <div class="page-badge">หน้า 10 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page11.png" alt="Portfolio Page 11 - Certificates 2" loading="lazy">
            <div class="page-badge">หน้า 11 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page12.png" alt="Portfolio Page 12 - Certificates 3" loading="lazy">
            <div class="page-badge">หน้า 12 / 13</div>
        </div>
        <div class="portfolio-item">
            <img src="assets/portfolio_page13.png" alt="Portfolio Page 13 - Thank You" loading="lazy">
            <div class="page-badge">หน้า 13 / 13</div>
        </div>
    </div>
</body>

</html>
